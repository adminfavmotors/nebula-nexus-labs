name: Deploy SEOHOST

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-seohost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to SEOHOST over FTP
        env:
          SEOHOST_FTP_USERNAME: ${{ secrets.SEOHOST_FTP_USERNAME }}
          SEOHOST_FTP_PASSWORD: ${{ secrets.SEOHOST_FTP_PASSWORD }}
        run: |
          lftp -e "
            set cmd:fail-exit true;
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            open -u ${SEOHOST_FTP_USERNAME},${SEOHOST_FTP_PASSWORD} ftp://h79.seohost.pl;
            mirror -R --verbose --parallel=2 ./dist /domains/node48.pl/public_html;
            bye
          "
