name: Deploy SEOHOST

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: Optional branch, tag, or commit SHA to deploy. Empty uses the selected branch SHA.
        required: false
        default: ""
        type: string

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-seohost-reusable.yml
    with:
      deploy_ref: ${{ inputs.deploy_ref }}
      deployment_reason: ${{ github.event_name == 'push' && 'push-to-main' || 'manual-deploy' }}
    secrets: inherit
