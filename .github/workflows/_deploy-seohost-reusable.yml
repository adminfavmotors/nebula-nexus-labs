name: _Deploy SEOHOST Reusable

on:
  workflow_call:
    inputs:
      deploy_ref:
        description: Branch, tag, or commit SHA to deploy. Empty uses the caller SHA.
        required: false
        default: ""
        type: string
      deployment_reason:
        description: Short label describing why this deployment is running.
        required: true
        type: string

concurrency:
  group: deploy-seohost-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://node48.pl

    permissions:
      contents: write

    steps:
      - name: Resolve deployment target
        id: resolve
        shell: bash
        run: |
          target_ref="${{ inputs.deploy_ref }}"

          if [ -z "$target_ref" ]; then
            target_ref="${GITHUB_SHA}"
          fi

          echo "target_ref=$target_ref" >> "$GITHUB_OUTPUT"

      - name: Checkout deployment target
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.resolve.outputs.target_ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Capture git metadata
        id: gitmeta
        shell: bash
        run: |
          deployed_sha="$(git rev-parse HEAD)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          timestamp_utc="$(date -u +"%Y%m%d-%H%M%S")"
          deployment_tag="prod-${timestamp_utc}-${short_sha}"

          echo "deployed_sha=$deployed_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "deployment_tag=$deployment_tag" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Prepare SEOHOST SSH key
        env:
          SEOHOST_SSH_PRIVATE_KEY: ${{ secrets.SEOHOST_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "${SEOHOST_SSH_PRIVATE_KEY}" ]; then
            echo "Missing required secret: SEOHOST_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${SEOHOST_SSH_PRIVATE_KEY}" > "${HOME}/.ssh/seohost_deploy_key"
          chmod 600 "${HOME}/.ssh/seohost_deploy_key"

      - name: Deploy to SEOHOST over SFTP
        run: |
          lftp -e "
            set cmd:fail-exit true;
            set net:timeout 20;
            set net:max-retries 2;
            set net:reconnect-interval-base 5;
            set sftp:auto-confirm yes;
            set sftp:connect-program 'ssh -a -x -i ${HOME}/.ssh/seohost_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -p 57185';
            open sftp://srv110507@h79.seohost.pl:57185;
            mirror -R --verbose --parallel=2 ./dist /domains/node48.pl/public_html;
            bye
          "

      - name: Create immutable production tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          tag_message="Production deployment (${{ inputs.deployment_reason }}) for ${{ steps.gitmeta.outputs.deployed_sha }}"

          git tag -a "${{ steps.gitmeta.outputs.deployment_tag }}" "${{ steps.gitmeta.outputs.deployed_sha }}" -m "$tag_message"

          git push origin "${{ steps.gitmeta.outputs.deployment_tag }}"

      - name: Publish deployment summary
        shell: bash
        run: |
          {
            echo "## Production deployment"
            echo
            echo "- Reason: \`${{ inputs.deployment_reason }}\`"
            echo "- Deployed ref: \`${{ steps.resolve.outputs.target_ref }}\`"
            echo "- Deployed commit: \`${{ steps.gitmeta.outputs.deployed_sha }}\`"
            echo "- Production tag: \`${{ steps.gitmeta.outputs.deployment_tag }}\`"
            echo "- Site URL: https://node48.pl"
          } >> "$GITHUB_STEP_SUMMARY"
